name: Bug report
description: Report reproducible incorrect behavior in Photopti.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not report security vulnerabilities or attach personal images. Use a minimal synthetic sample.
  - type: input
    id: version
    attributes:
      label: Photopti version
      placeholder: 1.0.0 or commit SHA
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options: [macOS, Windows, Linux]
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the expected and actual behavior.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: "1. Select ...\n2. Configure ...\n3. Observe ..."
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Include non-sensitive logs or screenshots and the input format and dimensions when relevant.
